<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦚 PEACOCK ENGINE | Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #e0e0e0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .message { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .streaming::after { content: '▋'; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .scrollbar::-webkit-scrollbar { width: 6px; }
        .scrollbar::-webkit-scrollbar-track { background: #1a1a2e; }
        .scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        pre { background: #1a1a2e; padding: 1rem; border-radius: 8px; overflow-x: auto; }
        code { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-[#131318] border-b border-white/10 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🦚</span>
            <h1 class="font-semibold text-lg">PEACOCK ENGINE</h1>
            <span id="status" class="text-xs px-2 py-1 rounded bg-green-500/20 text-green-400">● Online</span>
        </div>
        <div class="flex items-center gap-4">
            <select id="model" class="bg-[#1a1a2e] border border-white/10 rounded px-3 py-2 text-sm">
                <option value="gemini-2.0-flash-lite">gemini-2.0-flash-lite</option>
                <option value="llama-3.1-8b-instant">llama-3.1-8b-instant</option>
                <option value="gemini-2.5-flash">gemini-2.5-flash</option>
                <option value="moonshotai/kimi-k2-instruct">kimi-k2</option>
            </select>
            <button onclick="clearChat()" class="text-sm text-white/60 hover:text-white">Clear</button>
        </div>
    </header>

    <!-- Chat Area -->
    <div id="chat" class="flex-1 overflow-y-auto scrollbar p-6 space-y-4">
        <div class="text-center text-white/40 py-8">
            <p class="text-4xl mb-4">🦚</p>
            <p>PEACOCK ENGINE V3 is ready</p>
            <p class="text-sm mt-2">21 keys loaded • 40+ models available</p>
        </div>
    </div>

    <!-- Input Area -->
    <div class="bg-[#131318] border-t border-white/10 p-4">
        <div class="max-w-4xl mx-auto flex gap-3">
            <textarea 
                id="input" 
                placeholder="Message PEACOCK ENGINE..." 
                class="flex-1 bg-[#1a1a2e] border border-white/10 rounded-lg px-4 py-3 resize-none focus:outline-none focus:border-blue-500"
                rows="2"
                onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}"
            ></textarea>
            <button 
                onclick="sendMessage()" 
                id="sendBtn"
                class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-lg font-medium transition-colors"
            >
                Send
            </button>
        </div>
        <p class="text-center text-white/30 text-xs mt-2">Press Enter to send • Shift+Enter for new line</p>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const model = document.getElementById('model');
        const sendBtn = document.getElementById('sendBtn');
        let isStreaming = false;

        function addMessage(role, content, streaming = false) {
            const div = document.createElement('div');
            div.className = `message flex gap-4 ${role === 'user' ? 'flex-row-reverse' : ''}`;
            
            const avatar = role === 'user' ? 
                '<div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-sm">You</div>' :
                '<div class="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center text-xl">🦚</div>';
            
            const contentClass = streaming ? 'streaming' : '';
            const bubbleClass = role === 'user' ? 
                'bg-blue-600/20 border border-blue-500/30' : 
                'bg-[#1a1a2e] border border-white/10';
            
            div.innerHTML = `
                ${avatar}
                <div class="flex-1 ${role === 'user' ? 'text-right' : ''}">
                    <div class="inline-block max-w-3xl ${bubbleClass} rounded-lg px-4 py-3 text-left">
                        <div class="prose prose-invert max-w-none ${contentClass}" id="msg-${Date.now()}">${formatContent(content)}</div>
                    </div>
                </div>
            `;
            
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div.querySelector('[id^="msg-"]');
        }

        function formatContent(text) {
            // Simple markdown formatting
            return text
                .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code class="bg-black/30 px-1 rounded">$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        async function sendMessage() {
            if (isStreaming || !input.value.trim()) return;
            
            const message = input.value.trim();
            input.value = '';
            isStreaming = true;
            sendBtn.disabled = true;
            sendBtn.textContent = '...';
            
            // Add user message
            addMessage('user', message);
            
            // Add assistant placeholder
            const assistantMsg = addMessage('assistant', '', true);
            
            try {
                const response = await fetch('/v1/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: model.value,
                        prompt: message,
                        format: 'text'
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                assistantMsg.innerHTML = formatContent(data.content);
                assistantMsg.classList.remove('streaming');
                
            } catch (error) {
                assistantMsg.innerHTML = `<span class="text-red-400">Error: ${error.message}</span>`;
                assistantMsg.classList.remove('streaming');
            }
            
            isStreaming = false;
            sendBtn.disabled = false;
            sendBtn.textContent = 'Send';
        }

        function clearChat() {
            chat.innerHTML = `
                <div class="text-center text-white/40 py-8">
                    <p class="text-4xl mb-4">🦚</p>
                    <p>Chat cleared</p>
                </div>
            `;
        }

        // Check health on load
        fetch('/health')
            .then(r => r.json())
            .then(data => {
                document.getElementById('status').textContent = `● ${data.status}`;
            })
            .catch(() => {
                document.getElementById('status').textContent = '● Offline';
                document.getElementById('status').className = 'text-xs px-2 py-1 rounded bg-red-500/20 text-red-400';
            });
    </script>
</body>
</html>
